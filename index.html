<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Robot Animation Preview</title>
  <link rel="shortcut icon" href="./fav.svg" type="image/x-icon">
  <style>
    :root {
      color-scheme: light;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: linear-gradient(180deg, #f4f7ff 0%, #e8eefc 100%);
      font-family: Segoe UI, Tahoma, sans-serif;
      padding: 20px;
    }

    .grid {
      width: min(1100px, 100%);
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 20px;
    }

    .stage {
      aspect-ratio: 1 / 1;
      background: #b9ebfa;
      border-radius: 16px;
      box-shadow: 0 16px 40px rgba(24, 47, 102, 0.15);
      padding: 12px;
      position: relative;
      overflow: hidden;
    }

    .label {
      position: absolute;
      top: 10px;
      left: 10px;
      margin: 0;
      background: rgba(24, 47, 102, 0.08);
      color: #000000;
      border-radius: 999px;
      padding: 4px 10px;
      font-size: 12px;
      z-index: 2;
    }

    .download-btn {
      position: absolute;
      top: 10px;
      right: 10px;
      width: 30px;
      height: 30px;
      border: 0;
      border-radius: 999px;
      background: rgba(24, 47, 102, 0.12);
      color: #182f66;
      display: grid;
      place-items: center;
      cursor: pointer;
      z-index: 2;
      transition: background-color 0.15s ease;
    }

    .download-btn:hover {
      background: rgba(24, 47, 102, 0.2);
    }

    .download-btn svg {
      width: 16px;
      height: 16px;
    }

    .animated-svg {
      width: 100%;
      height: 100%;
      display: block;
    }

    .lottie-canvas {
      width: 100%;
      height: 100%;
    }

    .title {
      margin: 0 0 40px 0;
      color: #182f66;
      font-size: 24px;
    }
  </style>
</head>

<body>

  <h1 class="title">Tosh AI Robot Animation Preview</h1>

  <main class="grid">
    <section class="stage">
      <p class="label">Jump</p>
      <button class="download-btn" data-file="./robot-jump.json" aria-label="Download robot-jump.json" title="Download JSON">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path fill="currentColor" d="M12 15.2l4-4 1.4 1.4-6.4 6.4-6.4-6.4L6 11.2l4 4V3h2v12.2zM4 19h16v2H4z" />
        </svg>
      </button>
      <div id="lottie-robot" class="lottie-canvas" aria-label="Robot Lottie animation"></div>
    </section>
    <section class="stage">
      <p class="label">Hello</p>
      <button class="download-btn" data-file="./robot-hello.json" aria-label="Download robot-hello.json" title="Download JSON">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path fill="currentColor" d="M12 15.2l4-4 1.4 1.4-6.4 6.4-6.4-6.4L6 11.2l4 4V3h2v12.2zM4 19h16v2H4z" />
        </svg>
      </button>
      <div id="lottie-irobot" class="lottie-canvas" aria-label="i-robot Lottie animation"></div>
    </section>
    <section class="stage">
      <p class="label">Peeping Bottom</p>
      <button class="download-btn" data-file="./robot-peeping-bottom.json" aria-label="Download robot-peeping-bottom.json" title="Download JSON">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path fill="currentColor" d="M12 15.2l4-4 1.4 1.4-6.4 6.4-6.4-6.4L6 11.2l4 4V3h2v12.2zM4 19h16v2H4z" />
        </svg>
      </button>
      <div id="lottie-peeping-bottom" class="lottie-canvas" aria-label="Robot Lottie animation"></div>
    </section>
    <section class="stage">
      <p class="label">Peeping Left</p>
      <button class="download-btn" data-file="./robot-peeping-left.json" aria-label="Download robot-peeping-left.json" title="Download JSON">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path fill="currentColor" d="M12 15.2l4-4 1.4 1.4-6.4 6.4-6.4-6.4L6 11.2l4 4V3h2v12.2zM4 19h16v2H4z" />
        </svg>
      </button>
      <div id="lottie-peeping-left" class="lottie-canvas" aria-label="Robot Lottie animation"></div>
    </section>
    <section class="stage">
      <p class="label">Idle</p>
      <button class="download-btn" data-file="./robot-idle.json" aria-label="Download robot-idle.json" title="Download JSON">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path fill="currentColor" d="M12 15.2l4-4 1.4 1.4-6.4 6.4-6.4-6.4L6 11.2l4 4V3h2v12.2zM4 19h16v2H4z" />
        </svg>
      </button>
      <div id="lottie-idle" class="lottie-canvas" aria-label="Robot Lottie animation"></div>
    </section>
    <section class="stage">
      <p class="label">Cry</p>
      <button class="download-btn" data-file="./robot-cry.json" aria-label="Download robot-cry.json" title="Download JSON">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path fill="currentColor" d="M12 15.2l4-4 1.4 1.4-6.4 6.4-6.4-6.4L6 11.2l4 4V3h2v12.2zM4 19h16v2H4z" />
        </svg>
      </button>
      <div id="lottie-cry" class="lottie-canvas" aria-label="Robot Lottie animation"></div>
    </section>
    <section class="stage">
      <p class="label">Sad</p>
      <button class="download-btn" data-file="./robot-sad.json" aria-label="Download robot-sad.json" title="Download JSON">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path fill="currentColor" d="M12 15.2l4-4 1.4 1.4-6.4 6.4-6.4-6.4L6 11.2l4 4V3h2v12.2zM4 19h16v2H4z" />
        </svg>
      </button>
      <div id="lottie-sad" class="lottie-canvas" aria-label="Robot Lottie animation"></div>
    </section>
    <section class="stage">
      <p class="label">Waiting</p>
      <button class="download-btn" data-file="./robot-waiting.json" aria-label="Download robot-waiting.json" title="Download JSON">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path fill="currentColor" d="M12 15.2l4-4 1.4 1.4-6.4 6.4-6.4-6.4L6 11.2l4 4V3h2v12.2zM4 19h16v2H4z" />
        </svg>
      </button>
      <div id="lottie-waiting" class="lottie-canvas" aria-label="Robot Lottie animation"></div>
    </section>
    <section class="stage">
      <p class="label">Confused</p>
      <button class="download-btn" data-file="./robot-confused.json" aria-label="Download robot-confused.json" title="Download JSON">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path fill="currentColor" d="M12 15.2l4-4 1.4 1.4-6.4 6.4-6.4-6.4L6 11.2l4 4V3h2v12.2zM4 19h16v2H4z" />
        </svg>
      </button>
      <div id="lottie-confused" class="lottie-canvas" aria-label="Robot Lottie animation"></div>
    </section>
  </main>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/bodymovin/5.12.2/lottie.min.js"></script>
  <script>
    if (window.lottie) {
      lottie.loadAnimation({
        container: document.getElementById('lottie-robot'),
        renderer: 'svg',
        loop: true,
        autoplay: true,
        path: './robot-jump.json',
        rendererSettings: {
          preserveAspectRatio: 'xMidYMid meet'
        }
      });

      lottie.loadAnimation({
        container: document.getElementById('lottie-irobot'),
        renderer: 'svg',
        loop: true,
        autoplay: true,
        path: './robot-hello.json',
        rendererSettings: {
          preserveAspectRatio: 'xMidYMid meet'
        }
      });

      lottie.loadAnimation({
        container: document.getElementById('lottie-peeping-bottom'),
        renderer: 'svg',
        loop: true,
        autoplay: true,
        path: './robot-peeping-bottom.json',
        rendererSettings: {
          preserveAspectRatio: 'xMidYMid meet'
        }
      });

      lottie.loadAnimation({
        container: document.getElementById('lottie-peeping-left'),
        renderer: 'svg',
        loop: true,
        autoplay: true,
        path: './robot-peeping-left.json',
        rendererSettings: {
          preserveAspectRatio: 'xMidYMid meet'
        }
      });

      lottie.loadAnimation({
        container: document.getElementById('lottie-idle'),
        renderer: 'svg',
        loop: true,
        autoplay: true,
        path: './robot-idle.json',
        rendererSettings: {
          preserveAspectRatio: 'xMidYMid meet'
        }
      });

      
      lottie.loadAnimation({
        container: document.getElementById('lottie-cry'),
        renderer: 'svg',
        loop: true,
        autoplay: true,
        path: './robot-cry.json',
        rendererSettings: {
          preserveAspectRatio: 'xMidYMid meet'
        }
      });

      
      lottie.loadAnimation({
        container: document.getElementById('lottie-sad'),
        renderer: 'svg',
        loop: true,
        autoplay: true,
        path: './robot-sad.json',
        rendererSettings: {
          preserveAspectRatio: 'xMidYMid meet'
        }
      });

      lottie.loadAnimation({
        container: document.getElementById('lottie-waiting'),
        renderer: 'svg',
        loop: true,
        autoplay: true,
        path: './robot-waiting.json',
        rendererSettings: {
          preserveAspectRatio: 'xMidYMid meet'
        }
      });

      lottie.loadAnimation({
        container: document.getElementById('lottie-confused'),
        renderer: 'svg',
        loop: true,
        autoplay: true,
        path: './robot-confused.json',
        rendererSettings: {
          preserveAspectRatio: 'xMidYMid meet'
        }
      });
    }

    document.querySelectorAll('.download-btn').forEach((button) => {
      button.addEventListener('click', () => {
        const filePath = button.dataset.file;
        if (!filePath) return;

        const link = document.createElement('a');
        link.href = filePath;
        link.download = filePath.split('/').pop() || 'animation.json';
        document.body.appendChild(link);
        link.click();
        link.remove();
      });
    });
  </script>
</body>

</html>
